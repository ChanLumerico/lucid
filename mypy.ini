# mypy.ini — Lucid type-checking configuration
#
# Baseline (2026-05-10): ~220 errors in production code (excluding tests).
# Target: 0 errors at this level.
# CI gate: run `python tools/check_types.py` — fails if error count increases.
#
# Design rationale:
#   - `operator` / `index` disabled: Tensor arithmetic/indexing propagation
#     requires Generic[Shape, Dtype] which is aspirational. These two codes
#     account for ~2900 errors caused by one structural limitation.
#   - `allow_untyped_defs` kept True: H-rules enforce annotations via AST
#     scan (tools/check_stubs.py); separate CI gate avoids duplication.
#   - Everything else stays enabled — arg-type, attr-defined, override,
#     return-value, assignment, union-attr are real bugs we want to catch.

[mypy]
python_version = 3.14
ignore_missing_imports = True
allow_untyped_defs = True
allow_any_generics = True
warn_return_any = False
warn_unused_ignores = False
warn_unused_configs = True
no_implicit_reexport = True
show_error_codes = True
disable_error_code = operator, index

# C++ extension module — no stubs, skip entirely.
[mypy-lucid._C.*]
ignore_missing_imports = True
ignore_errors = True

# Third-party stubs.
[mypy-numpy.*]
ignore_missing_imports = True

[mypy-mlx.*]
ignore_missing_imports = True

# Test code is type-checked but not part of the CI gate.
# Errors here are tracked separately so they don't block production fixes.
[mypy-lucid.test.*]
ignore_errors = True
