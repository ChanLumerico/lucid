repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.4
    hooks:
      - id: ruff
        args: [--fix]
        files: ^lucid/

  - repo: local
    hooks:
      - id: mypy-strict
        name: mypy strict
        entry: mypy --strict lucid/
        language: system
        types: [python]
        pass_filenames: false
        always_run: true

  # Pin to v22.x to match CI (`clang-format>=22,<23`) and local Homebrew LLVM
  # 22 — older clang-format formats differently, causing flaky format-gate
  # mismatches between local pre-commit and CI.
  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v22.1.4
    hooks:
      - id: clang-format
        files: ^lucid/_C/.*\.(h|hpp|cpp|cc)$

  - repo: local
    hooks:
      - id: lucid-check-layers
        name: lucid layer dependency check
        entry: python tools/check_layers.py
        language: system
        pass_filenames: false

      - id: lucid-check-format
        name: lucid clang-format check
        entry: tools/check_format.sh --format-only
        language: system
        pass_filenames: false

      - id: lucid-stub-freshness
        name: lucid .pyi stub freshness
        entry: python tools/check_stubs.py
        language: system
        pass_filenames: false
        files: |
          (?x)^(
            lucid/_ops/_registry\.py |
            lucid/_tensor/tensor\.py |
            lucid/_tensor/_methods\.py |
            lucid/_tensor/_dunders\.py |
            lucid/_tensor/_to\.py |
            lucid/__init__\.py
          )$

      # Model-zoo family-contract validator.  Runs on every commit that
      # touches `lucid/models/<domain>/<family>/`-tier files — catches
      # missing @model_family_meta, malformed task-wrapper names, broken
      # directory layout, etc. before the change leaves the dev box.
      # Spec: obsidian/architecture/arch-models-family-contract.md
      - id: lucid-validate-model-zoo
        name: lucid model-zoo family contract
        entry: python -m tools.validate_model_zoo --runtime
        language: system
        pass_filenames: false
        files: ^lucid/models/(vision|text|generative)/[^/]+/.*\.py$
