name: Publish Test PyPI Wheels

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-wheels:
    name: Build wheel / Python ${{ matrix.python-version }}
    runs-on: macos-26
    strategy:
      fail-fast: false
      matrix:
        # Lucid is Python 3.14 only (PEP 649 lazy annotations; see ci.yml).
        python-version: ["3.14"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Enforce Apple Silicon runner
        run: |
          python - <<'PY'
          import platform

          system = platform.system()
          machine = platform.machine()
          if system != "Darwin" or machine != "arm64":
              raise SystemExit(f"Lucid release supports macOS arm64 only, got {system}/{machine}")
          print(f"runner={system}/{machine}")
          PY

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          # See ci.yml for why --no-build-isolation matters here (libmlx.dylib
          # RPATH must match between build env and runtime env).
          python -m pip install setuptools wheel cmake ninja pybind11 mlx
          python -m pip install --no-build-isolation -e ".[test]"

      - name: Build wheel only (no smoke yet)
        env:
          MACOSX_DEPLOYMENT_TARGET: "26.0"
          _PYTHON_HOST_PLATFORM: "macosx-26.0-arm64"
          ARCHFLAGS: "-arch arm64"
        run: |
          # Build the wheel — host env has mlx for linkage. Skip the
          # bundled smoke (ci_publish.sh runs both), we run smoke
          # separately below after stripping host mlx.
          python -m pip wheel . -w dist/ --no-deps --no-build-isolation -q
          ls -lh dist/

      - name: Strip host MLX (catch RPATH absolute-path regressions)
        # The 3.0.0 wheel baked the runner's Python framework MLX path as
        # an absolute LC_RPATH — the bundled smoke happened to pass because
        # the same path was reachable on the runner. To make the smoke a
        # truthful clean-machine simulation, uninstall mlx from the runner's
        # Python first. After this step, the wheel must resolve libmlx via
        # its own @loader_path RPATH pointing into the smoke venv only.
        run: |
          python -m pip uninstall -y mlx mlx-metal || true
          # Verify framework mlx really gone from the runner Python.
          python -c "
          import importlib.util
          spec = importlib.util.find_spec('mlx')
          assert spec is None, f'mlx still on host: {spec.origin}'
          print('host MLX successfully stripped')
          "

      - name: Verify wheel installs + imports (truly clean env)
        # Now ci_publish.sh creates a fresh venv, installs the wheel WITH
        # deps (so mlx ends up in the venv only), and imports. If RPATH
        # regresses to an absolute build-machine path, this step fails
        # closed because no mlx exists at that path anymore.
        env:
          MACOSX_DEPLOYMENT_TARGET: "26.0"
          _PYTHON_HOST_PLATFORM: "macosx-26.0-arm64"
          ARCHFLAGS: "-arch arm64"
        run: |
          # ci_publish.sh would re-build, but the wheel is already in dist/.
          # Inline the venv + smoke part directly to skip the rebuild.
          set -euo pipefail
          WHEEL=$(ls dist/lucid*.whl | sort -V | tail -1)
          echo "==> Smoke against $WHEEL"
          TMP=$(mktemp -d)
          python -m venv "$TMP/venv"
          "$TMP/venv/bin/pip" install "$WHEEL" -q
          ( cd "$TMP" && "$TMP/venv/bin/python" - <<'PY'
          import lucid
          from lucid._C import engine as E
          t = E.randn([3, 4])
          assert t.shape == [3, 4]
          # exercise mlx::core::as_strided (the 3.0.0 ABI failure point)
          x = lucid.arange(0, 24).reshape(2, 3, 4).permute(2, 0, 1)
          assert x.shape == (4, 2, 3)
          print(f"✅ wheel works against venv-only mlx: {lucid.__file__}")
          PY
          )

      - uses: actions/upload-artifact@v4
        with:
          name: lucid-testpypi-wheel-py${{ matrix.python-version }}
          path: dist/*.whl

  publish-testpypi:
    name: Publish to Test PyPI
    needs: build-wheels
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment:
      name: testpypi
      url: https://test.pypi.org/p/lucid-dl

    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: lucid-testpypi-wheel-*
          path: dist
          merge-multiple: true

      - name: List release artifacts
        run: ls -lh dist

      - name: Publish wheels to Test PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist
          skip-existing: true
