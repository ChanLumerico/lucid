name: Lucid C++ Engine CI

on:
  pull_request:
  push:
    branches: [main, lucid-3.0]
  workflow_dispatch:
  schedule:
    - cron: "17 9 * * *"

jobs:
  phase-gate:
    name: Phase gate / Python ${{ matrix.python-version }}
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Enforce Apple Silicon runner
        run: |
          python - <<'PY'
          import platform

          system = platform.system()
          machine = platform.machine()
          if system != "Darwin" or machine != "arm64":
              raise SystemExit(f"Lucid CI supports macOS arm64 only, got {system}/{machine}")
          print(f"runner={system}/{machine}")
          PY

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install cmake ninja pybind11
          python -m pip install -e ".[test]"

      - name: Run full local gate
        run: ./scripts/ci_full.sh

      - name: Build wheel artifact
        run: ./tools/build_wheel.sh

      - name: Verify wheel in fresh venv
        run: ./tools/verify_wheel.sh

      - uses: actions/upload-artifact@v4
        with:
          name: lucid-wheel-py${{ matrix.python-version }}
          path: dist/*.whl

  coverage:
    name: Coverage
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Enforce Apple Silicon runner
        run: |
          python - <<'PY'
          import platform

          system = platform.system()
          machine = platform.machine()
          if system != "Darwin" or machine != "arm64":
              raise SystemExit(f"Lucid CI supports macOS arm64 only, got {system}/{machine}")
          PY

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install cmake ninja pybind11
          python -m pip install -e ".[test]"

      - name: Run coverage
        run: ./tools/coverage.sh

      - uses: actions/upload-artifact@v4
        with:
          name: lucid-coverage-lcov
          path: build/coverage/lucid.lcov

  nightly-perf:
    name: Nightly perf placeholder
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install cmake ninja pybind11
          python -m pip install -e ".[test]"

      - name: Run perf placeholder
        run: python -m pytest tests/perf/ -q

      - uses: actions/upload-artifact@v4
        with:
          name: perf-history
          path: docs/perf/history.json
