name: Docs

# ``web/public/api-data/`` is built locally and committed (the pre-commit
# hook re-stages it whenever ``lucid/**/*.{py,pyi}`` changes), so this
# workflow only runs the cheap post-process scripts (cross-links /
# used-by / citations / meta) plus ``next build`` against the pre-baked
# JSON tree. No Griffe, no smoke-test duplicate.

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    name: Build docs
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Post-process scripts (cross-links / used-by / link-citations /
      # build-bibtex / build-meta) all run during ``pnpm prebuild`` and
      # need Python — but not Griffe, not Lucid, and not pip. The pip
      # cache option is intentionally omitted because we install zero
      # packages here; with it set, the post-run cleanup fails on an
      # empty ~/.cache/pip and tanks the whole job.
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4
        with:
          version: 11
          run_install: false

      - name: Get pnpm store path
        id: pnpm-cache
        run: echo "store=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.store }}
          key: pnpm-${{ runner.os }}-${{ hashFiles('web/pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - name: Install dependencies
        working-directory: web
        run: pnpm install --frozen-lockfile

      # ── Next.js build cache — incremental compile / image opt artifacts ───
      - uses: actions/cache@v4
        with:
          path: web/.next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('web/pnpm-lock.yaml') }}-${{ hashFiles('web/src/**/*.ts', 'web/src/**/*.tsx', 'web/public/api-data/**') }}
          restore-keys: |
            nextjs-${{ runner.os }}-${{ hashFiles('web/pnpm-lock.yaml') }}-

      - name: Build (Next.js static export)
        working-directory: web
        env:
          NODE_ENV: production
          SKIP_API_BUILD: "1"   # JSON tree is committed; never rebuild on CI
        run: pnpm build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/out

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
