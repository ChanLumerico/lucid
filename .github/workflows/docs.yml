name: Docs

# ``web/public/api-data/`` is built locally and committed (the pre-commit
# hook re-stages it whenever ``lucid/**/*.{py,pyi}`` changes), so this
# workflow only runs the cheap post-process scripts (cross-links /
# used-by / citations / meta) plus ``next build`` against the pre-baked
# JSON tree. No Griffe, no smoke-test duplicate.

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    name: Build docs
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Post-process scripts (cross-links / used-by / link-citations /
      # build-bibtex / build-meta) all run during ``pnpm prebuild`` and
      # need Python — but not Griffe, not Lucid, and not pip. The pip
      # cache option is intentionally omitted because we install zero
      # packages here; with it set, the post-run cleanup fails on an
      # empty ~/.cache/pip and tanks the whole job.
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      # Drift gate (source → api-data): the committed JSON tree is what we
      # deploy (SKIP_API_BUILD), so it must stay in sync with the Lucid source.
      # This compares per-module source-content hashes against the committed
      # .cache/modules.json — pure stdlib, so it needs neither Griffe nor a
      # built Lucid (consistent with this minimal runner).  Catches "edited a
      # docstring / signature but forgot to regenerate api-data".  Fix locally:
      # cd web && FORCE_API_BUILD=1 python3 scripts/build-api-data-cached.py
      - name: Check api-data source drift
        working-directory: web
        run: python3 scripts/build-api-data-cached.py --check

      # Regression tests for the reST->markdown converter (build-api-data.py).
      # Standalone stdlib script (no pytest) so it runs on this minimal runner.
      - name: Test reST->markdown converter
        working-directory: web
        run: python3 scripts/test_rst_converter.py

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4
        with:
          version: 11
          run_install: false

      - name: Get pnpm store path
        id: pnpm-cache
        run: echo "store=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.store }}
          key: pnpm-${{ runner.os }}-${{ hashFiles('web/pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - name: Install dependencies
        working-directory: web
        run: pnpm install --frozen-lockfile

      # ── Next.js build cache — incremental compile / image opt artifacts ───
      - uses: actions/cache@v4
        with:
          path: web/.next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('web/pnpm-lock.yaml') }}-${{ hashFiles('web/src/**/*.ts', 'web/src/**/*.tsx', 'web/public/api-data/**') }}
          restore-keys: |
            nextjs-${{ runner.os }}-${{ hashFiles('web/pnpm-lock.yaml') }}-

      - name: Build (Next.js static export)
        working-directory: web
        env:
          NODE_ENV: production
          SKIP_API_BUILD: "1"   # JSON tree is committed; never rebuild on CI
        run: pnpm build

      # Drift gate (post-processors → api-data): the prebuild above just re-ran
      # cross-links / used-by / link-citations / build-meta against the
      # committed JSON.  If that produced ANY change, the committed api-data was
      # stale (e.g. a citation link the deployed site shows but the repo lacks).
      # These post-processors don't touch the per-commit source-permalink SHA,
      # so a plain diff is exact.  Fix locally: cd web && pnpm build, then
      # commit public/api-data.
      - name: Check api-data post-processor drift
        working-directory: web
        run: |
          if ! git diff --quiet -- public/api-data ':!public/api-data/.cache'; then
            echo "::error::Committed api-data is stale w.r.t. post-processors — run 'pnpm build' in web/ and commit public/api-data."
            git diff --stat -- public/api-data ':!public/api-data/.cache'
            exit 1
          fi
          echo "✓ api-data post-processors in sync"

      # Component-contract audit (scripts/audit-docs.mjs): crawls every built
      # page, enforces the structural + UI design-language contracts, and fails
      # the deploy on any unregistered violation.  Keeps the docs site from
      # drifting (broken links, reST leaks, off-recipe cards, off-palette
      # colours).  Registered exceptions live in scripts/audit/exceptions.mjs.
      - name: Audit docs (component contracts)
        working-directory: web
        run: node scripts/audit-docs.mjs

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/out

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
