[build-system]
requires = [
    "setuptools>=68",
    "wheel",
    "pybind11>=2.10",
    "cmake>=3.24",
    "ninja>=1.11",
]
build-backend = "setuptools.build_meta"

[project]
name = "lucid"
version = "3.0.0"
description = "Apple Silicon ML framework"
requires-python = ">=3.12"
dependencies = ["numpy>=1.24"]

[project.optional-dependencies]
dev = [
    "pytest>=7",
    "ruff>=0.4",
    "mypy>=1.8",
]

[tool.pytest.ini_options]
markers = [
    "parity: lucid<->torch numerical parity test",
    "smoke: quick sanity test",
    "slow: slow test (model forwards, long trajectories)",
]
