[build-system]
requires = [
    "setuptools>=68",
    "wheel",
    "pybind11>=2.10",
    "cmake>=3.24",
    "ninja>=1.11",
]
build-backend = "setuptools.build_meta"

[project]
name = "lucid"
version = "3.0.0"
description = "Apple Silicon ML framework"
requires-python = ">=3.12"
# Lucid is self-contained: ``import lucid`` and the full forward + backward +
# optimizer + save/load lifecycle work without numpy installed.  NumPy is
# only needed at the explicit user-facing bridge surface (``tensor(np_arr)``,
# ``.numpy()``, ``from_numpy``, DLPack interop) and inside the test tier.
# Declare it as an optional extra rather than a hard runtime dep.
dependencies = []

[project.optional-dependencies]
numpy = ["numpy>=1.24"]
dev = [
    "pytest>=7",
    "ruff>=0.4",
    "mypy>=1.8",
    "numpy>=1.24",
]
test = [
    "pytest>=7",
    "pytest-benchmark>=4",
    "numpy>=1.24",
    # The reference framework is *intentionally* not declared here —
    # parity tests use a lazy import and skip cleanly when missing.
    # Install it separately when running parity / perf comparisons.
]
docs = [
    "sphinx>=7.4",
    "sphinx-autobuild>=2024.4",
    "pydata-sphinx-theme>=0.15",
    "breathe>=4.35",
    "exhale>=0.3.7",
    "myst-parser>=3.0",
    "sphinx-design>=0.6",
    "sphinxcontrib-mermaid>=0.9",
]

[tool.setuptools.packages.find]
where = ["."]
exclude = ["lucid.test*", "lucid.benchmarks*"]

[tool.setuptools.package-data]
lucid = ["py.typed"]

[tool.pytest.ini_options]
testpaths = ["lucid/test"]
markers = [
    "parity:    numerical parity vs reference framework (auto-skip when missing)",
    "smoke:     quick sanity test (< 1s)",
    "slow:      end-to-end, > 5s (model forwards, training loops)",
    "gpu:       requires Apple Silicon GPU (Metal); auto-skip otherwise",
    "perf:      pytest-benchmark timing test (opt-in via --benchmark-only)",
    "stability: numerical-edge / extreme-value coverage (inf / nan / subnormal)",
    "f64_only:  float64-only path; skipped when only f32 is available",
]
addopts = "-v --tb=short"
