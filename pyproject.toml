[build-system]
requires = [
    "setuptools>=68",
    "wheel",
    "pybind11>=2.10",
    "cmake>=3.24",
    "ninja>=1.11",
]
build-backend = "setuptools.build_meta"

[project]
name = "lucid"
version = "3.0.0"
description = "Apple Silicon ML framework"
requires-python = ">=3.12"
dependencies = ["numpy>=1.24"]

[project.optional-dependencies]
dev = [
    "pytest>=7",
    "ruff>=0.4",
    "mypy>=1.8",
]
docs = [
    "sphinx>=7.2",
    "shibuya",
    "sphinx-autobuild",
]

[tool.setuptools.package-data]
lucid = ["py.typed"]

[tool.pytest.ini_options]
testpaths = ["lucid/test"]
markers = [
    "parity: numerical parity vs reference framework",
    "smoke:  quick sanity test (< 1s)",
    "slow:   end-to-end, > 5s (model forwards, training loops)",
    "gpu:    requires Apple Silicon GPU (MLX)",
]
addopts = "-v --tb=short"
